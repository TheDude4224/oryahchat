<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OryahChat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f0f; --surface: #1a1a2e; --surface2: #16213e;
  --text: #e0e0e0; --text2: #888; --accent: #7c3aed;
  --accent2: #a78bfa; --user-bg: #2d1b69; --bot-bg: #1e293b;
  --border: #2a2a4a; --danger: #ef4444; --success: #22c55e;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 1.4em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sidebar-header p { font-size: 0.75em; color: var(--text2); margin-top: 4px; }
.agent-list { flex: 1; overflow-y: auto; padding: 8px; }
.agent-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
.agent-item:hover { background: var(--surface2); }
.agent-item.active { background: var(--accent); color: white; }
.agent-item .emoji { font-size: 1.5em; width: 36px; text-align: center; }
.agent-item .info { flex: 1; }
.agent-item .name { font-weight: 600; font-size: 0.9em; }
.agent-item .model { font-size: 0.7em; color: var(--text2); }
.agent-item.active .model { color: rgba(255,255,255,0.7); }
.agent-item .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; transition: background 0.3s; }
.agent-item .status-dot.online { background: var(--success); }
.agent-item .status-dot.offline { background: var(--danger); }

/* Main chat */
.main { flex: 1; display: flex; flex-direction: column; }
.chat-header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.chat-header .emoji { font-size: 1.8em; }
.chat-header .name { font-size: 1.1em; font-weight: 600; }
.chat-header .model { font-size: 0.8em; color: var(--text2); }

.messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
.msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
.msg-wrap.user { align-self: flex-end; align-items: flex-end; }
.msg-wrap.assistant { align-self: flex-start; align-items: flex-start; }
.msg-wrap.error { align-self: center; align-items: center; }
.message { padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 0.9em; word-wrap: break-word; }
.message.user { background: var(--user-bg); border-bottom-right-radius: 4px; white-space: pre-wrap; }
.message.assistant { background: var(--bot-bg); border-bottom-left-radius: 4px; }
.message.error { background: rgba(239,68,68,0.15); color: var(--danger); font-size: 0.8em; border-radius: 8px; }
.message.typing { background: var(--bot-bg); border-bottom-left-radius: 4px; }
.msg-time { font-size: 0.65em; color: var(--text2); margin-top: 4px; padding: 0 4px; }
.typing-dots { display: inline-flex; gap: 4px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* Input */
.input-area { padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border); }
.input-row { display: flex; gap: 12px; }
.input-row textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-family: inherit; font-size: 0.9em; resize: none; outline: none; max-height: 120px; }
.input-row textarea:focus { border-color: var(--accent); }
.input-row button { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 1.1em; cursor: pointer; transition: background 0.2s; }
.input-row button:hover { background: var(--accent2); }
.input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Welcome */
.welcome { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--text2); }
.welcome h2 { font-size: 1.5em; color: var(--text); margin-bottom: 8px; }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { width: 70px; }
  .sidebar-header h1 { font-size: 1em; }
  .sidebar-header p, .agent-item .info { display: none; }
  .agent-item { justify-content: center; padding: 12px 8px; }
  .agent-item .status-dot { display: none; }
}

/* Markdown */
.message.assistant p { margin-bottom: 0.5em; }
.message.assistant p:last-child { margin-bottom: 0; }
.message code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
.message pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.message pre code { background: none; padding: 0; }
.message ul, .message ol { padding-left: 1.5em; margin: 0.5em 0; }
.message h1,.message h2,.message h3 { margin: 0.5em 0 0.3em; }
.message blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 0.5em 0; }
.message table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
.message th,.message td { border: 1px solid var(--border); padding: 6px 10px; }
.message th { background: rgba(124,58,237,0.2); }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>🐾 OryahChat</h1>
    <p>Agent Console</p>
  </div>
  <div class="agent-list" id="agentList"></div>
</div>
<div class="main" id="main">
  <div class="welcome">
    <div>
      <h2>🐾 OryahChat</h2>
      <p>Select an agent to start chatting</p>
    </div>
  </div>
</div>

<script>
let ws, agents = [], activeAgent = null, sending = false;
const histories = {};
const agentStatus = {};

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

async function init() {
  const res = await fetch('/api/agents');
  agents = await res.json();
  renderAgents();
  connectWS();
  pollStatus();
  setInterval(pollStatus, 30000);
}

async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const status = await res.json();
    Object.assign(agentStatus, status);
    updateStatusDots();
  } catch (e) {}
}

function updateStatusDots() {
  document.querySelectorAll('.agent-item').forEach(el => {
    const id = el.dataset.agentId;
    const dot = el.querySelector('.status-dot');
    if (dot && id) {
      dot.className = 'status-dot ' + (agentStatus[id] || '');
    }
  });
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWSMessage(msg);
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

function renderAgents() {
  const list = document.getElementById('agentList');
  list.innerHTML = agents.map(a => `
    <div class="agent-item${activeAgent === a.id ? ' active' : ''}" data-agent-id="${a.id}" onclick="selectAgent('${a.id}')">
      <span class="emoji">${a.emoji}</span>
      <div class="info">
        <div class="name">${a.name}</div>
        <div class="model">${a.model}</div>
      </div>
      <div class="status-dot ${agentStatus[a.id] || ''}"></div>
    </div>
  `).join('');
}

function selectAgent(id) {
  activeAgent = id;
  const agent = agents.find(a => a.id === id);
  if (!histories[id]) histories[id] = [];
  renderAgents();
  renderChat(agent);
}

function renderChat(agent) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="chat-header">
      <span class="emoji">${agent.emoji}</span>
      <div>
        <div class="name">${agent.name}</div>
        <div class="model">${agent.model}</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Message ${agent.name}..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="send()">➤</button>
      </div>
    </div>
  `;
  renderMessages();
  document.getElementById('input').focus();
  const ta = document.getElementById('input');
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; });
}

function renderMessages() {
  const el = document.getElementById('messages');
  if (!el) return;
  const msgs = histories[activeAgent] || [];
  el.innerHTML = msgs.map(m => {
    if (m.type === 'typing') {
      return `<div class="msg-wrap assistant"><div class="message typing"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    }
    if (m.role === 'error') {
      return `<div class="msg-wrap error"><div class="message error">${escapeHtml(m.content)}</div></div>`;
    }
    const timeStr = m.ts ? `<div class="msg-time">${formatTime(m.ts)}</div>` : '';
    if (m.role === 'user') {
      return `<div class="msg-wrap user"><div class="message user">${escapeHtml(m.content)}</div>${timeStr}</div>`;
    }
    // assistant — render markdown
    const htmlContent = marked.parse(m.content || '');
    return `<div class="msg-wrap assistant"><div class="message assistant">${htmlContent}</div>${timeStr}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function send() {
  if (sending || !activeAgent) return;
  const input = document.getElementById('input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  input.style.height = 'auto';

  histories[activeAgent].push({ role: 'user', content, ts: Date.now() });
  renderMessages();

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  ws.send(JSON.stringify({ type: 'chat', agent: activeAgent, content }));
}

function handleWSMessage(msg) {
  if (!msg.agent || msg.agent !== activeAgent) {
    if (msg.agent && msg.type === 'chunk') {
      if (!histories[msg.agent]) histories[msg.agent] = [];
      const last = histories[msg.agent][histories[msg.agent].length - 1];
      if (last && last.role === 'assistant' && last.streaming) {
        last.content += msg.content;
      } else {
        histories[msg.agent].push({ role: 'assistant', content: msg.content, streaming: true, ts: Date.now() });
      }
    }
    if (msg.agent && msg.type === 'done') {
      const h = histories[msg.agent];
      if (h) { const last = h[h.length-1]; if (last) delete last.streaming; }
    }
    return;
  }

  if (msg.type === 'typing') {
    histories[activeAgent].push({ type: 'typing' });
    renderMessages();
  } else if (msg.type === 'chunk') {
    histories[activeAgent] = histories[activeAgent].filter(m => m.type !== 'typing');
    const last = histories[activeAgent][histories[activeAgent].length - 1];
    if (last && last.role === 'assistant' && last.streaming) {
      last.content += msg.content;
    } else {
      histories[activeAgent].push({ role: 'assistant', content: msg.content, streaming: true, ts: Date.now() });
    }
    renderMessages();
  } else if (msg.type === 'done') {
    histories[activeAgent] = histories[activeAgent].filter(m => m.type !== 'typing');
    const last = histories[activeAgent][histories[activeAgent].length - 1];
    if (last) delete last.streaming;
    sending = false;
    const btn = document.getElementById('sendBtn');
    if (btn) btn.disabled = false;
    renderMessages();
  } else if (msg.type === 'error') {
    histories[activeAgent] = histories[activeAgent].filter(m => m.type !== 'typing');
    histories[activeAgent].push({ role: 'error', content: msg.error });
    sending = false;
    const btn = document.getElementById('sendBtn');
    if (btn) btn.disabled = false;
    renderMessages();
  }
}

init();
</script>
</body>
</html>
