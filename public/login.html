<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OryahChat — Login</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f0f; --surface: #1a1a2e; --surface2: #16213e;
  --text: #e0e0e0; --text2: #888; --accent: #7c3aed;
  --accent2: #a78bfa; --border: #2a2a4a; --danger: #ef4444;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-card h1 {
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-card .subtitle {
  text-align: center;
  color: var(--text2);
  font-size: 0.85em;
  margin-bottom: 32px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 0.8em;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.95em;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus {
  border-color: var(--accent);
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.login-btn:hover {
  background: var(--accent2);
}
.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.error-msg {
  color: var(--danger);
  font-size: 0.85em;
  text-align: center;
  margin-top: 12px;
  min-height: 20px;
}
.paw {
  text-align: center;
  font-size: 3em;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="paw">🐾</div>
  <h1>OryahChat</h1>
  <p class="subtitle">Sign in to continue</p>
  <form id="loginForm" onsubmit="login(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
  </form>
  <div class="error-msg" id="error"></div>
</div>

<script>
// If already authenticated, redirect to main app
fetch('/api/auth/check').then(r => r.json()).then(d => {
  if (d.authenticated) window.location.href = '/';
});

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('error');
  btn.disabled = true;
  error.textContent = '';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      error.textContent = data.error || 'Login failed';
    }
  } catch (err) {
    error.textContent = 'Connection error';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
